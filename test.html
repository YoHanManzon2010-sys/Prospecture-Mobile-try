<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Fredoka', sans-serif;
      background: url("Background.png") no-repeat center center fixed;
      background-size: cover;
      color: white;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }

    /* Progress bar */
    .progress-container {
      max-width: 1300px;
      margin: 18px auto;
      width: 100%;
    }

    .progress-wrapper {
      max-width: 800px;
      height: clamp(12px, 3vw, 24px);
      border-radius: clamp(20px, 4vw, 40px);
      background: rgba(255, 255, 255, 0.2);
      margin: 0 auto;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9b5cff, #00d4ff);
      border-radius: clamp(20px, 4vw, 40px);
      transition: width 0.5s ease;
    }

    /* Question counter */
    .question-counter {
      max-width: 1100px;
      font-size: clamp(1rem, 2.5vw, 28px);
      justify-content: space-between;
      display: flex;
      margin: 10px auto;
      padding: 0 10px;
    }

    /* Main container */
    .container {
      max-width: 1200px;
      margin: 12px auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 95%;
    }

    /* Question box */
    .question-box {
      width: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: clamp(15px, 3vw, 30px);
      padding: clamp(1rem, 3vw, 30px);
      margin-bottom: clamp(1rem, 3vw, 25px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .question-box h2 {
      font-size: clamp(1.25rem, 3vw, 2rem);
      margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
      text-align: center;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: clamp(0.75rem, 2vw, 1.5rem);
      width: 100%;
    }

    .option {
      width: 100%;
      padding: clamp(0.75rem, 2vw, 1.25rem);
      font-size: clamp(0.9rem, 2vw, 1.25rem);
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: clamp(10px, 2vw, 20px);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .option:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateX(5px);
    }

    .option.selected {
      background: linear-gradient(90deg, #9b5cff, #00d4ff);
      border-color: transparent;
    }

    /* Navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      margin-top: auto;
      gap: 1rem;
    }

    .nav-btn {
      padding: clamp(0.75rem, 2vw, 1rem) clamp(1.5rem, 4vw, 2rem);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 600;
      border: none;
      border-radius: clamp(25px, 5vw, 50px);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Fredoka', sans-serif;
    }

    .prev-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .next-btn {
      background: linear-gradient(90deg, #9b5cff, #00d4ff);
      color: white;
    }

    .nav-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Title */
    .title {
      text-align: center;
      font-size: clamp(2rem, 5vw, 36px);
      margin: clamp(0.5rem, 2vw, 1rem) 0;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      body {
        padding: 0.5rem;
      }

      .nav-buttons {
        flex-direction: column;
        width: 100%;
      }

      .nav-btn {
        width: 100%;
      }
    }

    /* Touch device */
    @media (hover: none) and (pointer: coarse) {
      .option:hover {
        transform: none;
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .option:active {
        background: linear-gradient(90deg, #9b5cff, #00d4ff);
        border-color: transparent;
      }

      .nav-btn:hover {
        transform: none;
      }

      .nav-btn:active {
        transform: scale(0.98);
      }
    }
  </style>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress-container">
    <div class="progress-wrapper">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Question Counter -->
  <div class="question-counter">
    <span>Question: <span id="currentQuestion">1</span>/10</span>
    <span>Score: <span id="score">0</span></span>
  </div>

  <!-- Title -->
  <h1 class="title">APTITUDE TEST</h1>

  <!-- Main Container -->
  <div class="container">
    <div class="question-box">
      <h2 id="questionText">Loading question...</h2>
      <div class="options" id="optionsContainer">
        <!-- Options will be generated here -->
      </div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn prev-btn" id="prevBtn" disabled>Previous</button>
      <button class="nav-btn next-btn" id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    // Questions data
    const questions = [
      {
        question: "I am good at solving mathematical problems.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "math"
      },
      {
        question: "I enjoy reading and writing stories.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "language"
      },
      {
        question: "I like to conduct experiments and explore scientific concepts.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "science"
      },
      {
        question: "I am skilled at organizing and planning activities.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "business"
      },
      {
        question: "I enjoy analyzing data and finding patterns.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "data"
      },
      {
        question: "I am good at understanding and relating to others' emotions.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "social"
      },
      {
        question: "I enjoy creating visual designs and artwork.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "artistic"
      },
      {
        question: "I am skilled at fixing mechanical devices.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "mechanical"
      },
      {
        question: "I enjoy helping and teaching others.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "helping"
      },
      {
        question: "I am good at making decisions quickly and effectively.",
        options: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
        scores: [1, 2, 3, 4, 5],
        type: "leadership"
      }
    ];

    let currentQuestion = 0;
    let userAnswers = new Array(10).fill(null);
    let score = 0;

    // Load question
    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('currentQuestion').textContent = currentQuestion + 1;
      
      // Update progress bar
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
      
      // Generate options
      const optionsContainer = document.getElementById('optionsContainer');
      optionsContainer.innerHTML = '';
      
      q.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option';
        if (userAnswers[currentQuestion] === index) {
          button.classList.add('selected');
        }
        button.textContent = option;
        button.onclick = () => selectOption(index);
        optionsContainer.appendChild(button);
      });
      
      // Update navigation buttons
      document.getElementById('prevBtn').disabled = currentQuestion === 0;
      document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'Finish' : 'Next';
    }

    // Select option
    function selectOption(index) {
      userAnswers[currentQuestion] = index;
      score += questions[currentQuestion].scores[index];
      
      // Update UI
      const options = document.querySelectorAll('.option');
      options.forEach((opt, i) => {
        if (i === index) {
          opt.classList.add('selected');
        } else {
          opt.classList.remove('selected');
        }
      });
      
      document.getElementById('score').textContent = score;
    }

    // Next question
    document.getElementById('nextBtn').onclick = function() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        // Save score and redirect
        localStorage.setItem('aptitudeScore', score);
        window.location.href = 'result.html';
      }
    };

    // Previous question
    document.getElementById('prevBtn').onclick = function() {
      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    };

    // Load first question
    loadQuestion();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Science</title>

<style>
/* YOUR UI UNCHANGED */
*{box-sizing:border-box;font-family:"Segoe UI", Tahoma, sans-serif;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("Academic Subs/science.gif") no-repeat center/cover fixed;
  overflow:hidden;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}

body.page-visible{opacity:1;}

.overlay{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  height:100%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:40px;
  max-width:1000px;
  padding:20px;
}

.back-btn{
  position:absolute;
  left:20px;
  top:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.12);
  color:#fff;
  font-size:36px;
  cursor:pointer;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.back-btn:hover{transform:scale(1.1);}

/* ✅ RESET BUTTON NOW VISIBLE */
.reset-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.reset-btn:hover{
  transform:scale(1.1);
  background:rgba(255,255,255,0.3);
}

.card{
  height:300px;
  width:400px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 10px 30px rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 0.3s ease;
  overflow:hidden;
  padding:20px;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  max-width:90%;
  max-height:70%;
  object-fit:contain;
  pointer-events:none;
  filter:drop-shadow(0 5px 15px rgba(0,0,0,0.5));
  animation:pulse 3s infinite ease-in-out;
}

.subject-name{
  margin-top:15px;
  color:white;
  font-size:24px;
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:2px;
}

.highscore{
  margin-top:10px;
  color:gold;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

a{text-decoration:none;}
</style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='skill-test.html'">←</button>

<!-- ✅ Reset button with icon -->
<button class="reset-btn" onclick="resetAllScores()">⟳</button>

<div class="overlay">
<div class="grid">

<a href="earth-science.html">
<div class="card">
<img src="Academic Subs/science/earthscience.png">
<div class="subject-name">Earth Science</div>
<div class="highscore" id="earthScore"></div>
</div>
</a>

<a href="physics.html">
<div class="card">
<img src="Academic Subs/science/physics.png">
<div class="subject-name">Physics</div>
<div class="highscore" id="physicshighscore"></div>
</div>
</a>

<a href="biology.html">
<div class="card">
<img src="Academic Subs/science/bio.png">
<div class="subject-name">Biology</div>
<div class="highscore" id="bioScore"></div>
</div>
</a>

<a href="chemistry.html">
<div class="card">
<img src="Academic Subs/science/chemist.png">
<div class="subject-name">Chemistry</div>
<div class="highscore" id="chemScore"></div>
</div>
</a>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

  document.body.classList.add("page-visible");

  document.getElementById("bioScore").innerText =
    "High Score: " + (localStorage.getItem("bioHighScore") || 0);

  document.getElementById("physicshighscore").innerText =
    "High Score: " + (localStorage.getItem("physicsHighScore") || 0);

  document.getElementById("chemScore").innerText =
    "High Score: " + (localStorage.getItem("chemHighScore") || 0);

  document.getElementById("earthScore").innerText =
    "High Score: " + (localStorage.getItem("earthHighScore") || 0);
});

function resetAllScores(){
  localStorage.removeItem("bioHighScore");
  localStorage.removeItem("physicsHighScore");
  localStorage.removeItem("chemHighScore");
  localStorage.removeItem("earthHighScore");
  location.reload();
}
</script>

</body>
</html>
